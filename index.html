    // --- SUB-COMPONENTS ---

    const SinglePoster = ({ product, updateProduct, config }) => {

    // --- MAIN APP COMPONENT ---
    function App() {
      const [mode, setMode] = useState('bulk');
      const [step, setStep] = useState(1);
      
      const [demographic, setDemographic] = useState('Men');
      const [productType, setProductType] = useState('PU');
      const [isCustomCategory, setIsCustomCategory] = useState(false);
      const [customCategory, setCustomCategory] = useState('');
      const [category, setCategory] = useState('');
      const [defaultSize, setDefaultSize] = useState(SIZE_PRESETS['Men'] || '6x10');
      
      const [products, setProducts] = useState([]);
      const [isDragging, setIsDragging] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [showPrintHint, setShowPrintHint] = useState(false);
      const [posterScale, setPosterScale] = useState(1);
      
      const [config, setConfig] = useState({
          themeId: 'street',
          useCustomBg: false,
          bgStart: '#2dbcb4',
          bgEnd: '#1e9b94',
          fontFamily: 'font-sans'
      });
      const [activeSlot, setActiveSlot] = useState(null);

      const fileInputRef = useRef(null);
      const containerRef = useRef(null);
      const slotFileInputRef = useRef(null);

      const handleNextStep1 = () => {
        if (mode === 'single') {
          setStep(2);
          return;
        }
        
        const finalCategory = isCustomCategory 
          ? customCategory 
          : `${demographic} ${productType}`;

        if (finalCategory.trim()) {
          setCategory(finalCategory);
          
          const lowerCat = finalCategory.toLowerCase();
          let newTheme = 'street';
          if (lowerCat.includes('sports') || lowerCat.includes('athletic')) newTheme = 'sports';
          else if (lowerCat.includes('women') || lowerCat.includes('ladies') || lowerCat.includes('formal')) newTheme = 'elegant';
          else if (lowerCat.includes('kids') || lowerCat.includes('child') || lowerCat.includes('school')) newTheme = 'kids';
          
          setConfig(prev => ({ ...prev, themeId: newTheme }));
          setStep(2);
        }
      };

      const parseFilename = (filename) => {
        let nameWithoutExt = filename.substring(0, filename.lastIndexOf('.')) || filename;
        const parts = nameWithoutExt.split(/[-_]/);
        if (parts.length > 1) {
          let lastPart = parts[parts.length - 1].trim();
          if (!/\d/.test(lastPart)) {
             return { article: parts.slice(0, -1).join('-').trim(), color: lastPart, size: defaultSize };
          }
        }
        const spaceParts = nameWithoutExt.split(' ');
        if (spaceParts.length > 1) {
           let lastPart = spaceParts[spaceParts.length - 1].trim();
           if (!/\d/.test(lastPart)) {
             return { article: spaceParts.slice(0, -1).join(' ').trim(), color: lastPart, size: defaultSize };
           }
        }
        return { article: nameWithoutExt.trim(), color: '', size: defaultSize };
      };

      const removeWhiteBG = (file) => {
        return new Promise((resolve) => {
          const img = new Image();
          const originalUrl = URL.createObjectURL(file);
          
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const w = img.width; const h = img.height;
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            
            const isBgColor = (r, g, b) => r > 150 && g > 150 && b > 150 && (Math.max(r,g,b) - Math.min(r,g,b) < 30);
            const isPureWhite = (r, g, b) => r > 240 && g > 240 && b > 240;
            
            const isBgMask = new Uint8Array(w * h);
            const stack = [];
            
            for (let x = 0; x < w; x++) {
               if (isBgColor(data[(x) * 4], data[(x) * 4 + 1], data[(x) * 4 + 2])) stack.push(x, 0);
               if (isBgColor(data[(x + (h - 1) * w) * 4], data[(x + (h - 1) * w) * 4 + 1], data[(x + (h - 1) * w) * 4 + 2])) stack.push(x, h - 1);
            }
            for (let y = 0; y < h; y++) {
               if (isBgColor(data[(y * w) * 4], data[(y * w) * 4 + 1], data[(y * w) * 4 + 2])) stack.push(0, y);
               if (isBgColor(data[((w - 1) + y * w) * 4], data[((w - 1) + y * w) * 4 + 1], data[((w - 1) + y * w) * 4 + 2])) stack.push(w - 1, y);
            }

            while (stack.length > 0) {
              const py = stack.pop();
              const px = stack.pop();
              const pIdx = py * w + px;
              
              if (isBgMask[pIdx]) continue; 
              isBgMask[pIdx] = 1; 
              
              const checkAndPush = (nx, ny) => {
                  const nIdx = ny * w + nx;
                  if (!isBgMask[nIdx]) {
                      const i = nIdx * 4;
                      if (isBgColor(data[i], data[i+1], data[i+2])) {
                          stack.push(nx, ny);
                      }
                  }
              };

              if (px > 0) checkAndPush(px - 1, py);
              if (px < w - 1) checkAndPush(px + 1, py);
              if (py > 0) checkAndPush(px, py - 1);
              if (py < h - 1) checkAndPush(px, py + 1);
            }

            const finalMask = new Uint8Array(w * h);
            const EROSION = 2; 

            for (let y = 0; y < h; y++) {
              for (let x = 0; x < w; x++) {
                 const pIdx = y * w + x;
                 const i = pIdx * 4;

                 if (isPureWhite(data[i], data[i+1], data[i+2])) {
                     finalMask[pIdx] = 1;
                     continue;
                 }

                 if (isBgMask[pIdx]) {
                     finalMask[pIdx] = 1; 
                 } else {
                     let nearBg = 0;
                     for (let dy = -EROSION; dy <= EROSION; dy++) {
                         for (let dx = -EROSION; dx <= EROSION; dx++) {
                             if (dx === 0 && dy === 0) continue;
                             const nx = x + dx;
                             const ny = y + dy;
                             if (nx >= 0 && nx < w && ny >= 0 && ny < h) {
                                 if (isBgMask[ny * w + nx]) nearBg++;
                             }
                         }
                     }
                     if (nearBg > 6) {
                         finalMask[pIdx] = 1; 
                     } else if (nearBg > 2) {
                         finalMask[pIdx] = 2; 
                     }
                 }
              }
            }

            for (let i = 0; i < w * h; i++) {
               if (finalMask[i] === 1) {
                   data[i * 4 + 3] = 0; 
               } else if (finalMask[i] === 2) {
                   data[i * 4 + 3] = Math.max(0, data[i * 4 + 3] - 160); 
                   data[i * 4] = Math.max(0, data[i * 4] - 30);
                   data[i * 4 + 1] = Math.max(0, data[i * 4 + 1] - 30);
                   data[i * 4 + 2] = Math.max(0, data[i * 4 + 2] - 30);
               }
            }

            ctx.putImageData(imageData, 0, 0);
            resolve(canvas.toDataURL('image/png', 1.0));
            URL.revokeObjectURL(originalUrl);
          };
          img.src = originalUrl;
        });
      };

      const handleFiles = async (files) => {
        setIsProcessing(true); 
        const processed = await Promise.all(Array.from(files).map(async (file, index) => {
          const parsed = parseFilename(file.name);
          const url = await removeWhiteBG(file); 
          return { id: Date.now() + index, file, url, ...parsed };
        }));

        if (mode === 'single') {
            setProducts([{
                id: Date.now(),
                article: processed[0].article,
                size: processed[0].size,
                images: [{ url: processed[0].url, color: processed[0].color }],
                transform: { rotate: 0, scale: 1.4, x: 0, y: 0 },
                textStyle: { font: 'font-[Impact]', articleSize: 4.5, detailsSize: 2.2 } 
            }]);
        } else {
            setProducts(prev => {
                let newProducts = [...prev];
                processed.forEach(item => {
                    let articleIndex = newProducts.findIndex(p => p.article.toLowerCase() === item.article.toLowerCase());
                    if (articleIndex === -1) {
                        const newArticle = {
                            id: Date.now() + Math.random(),
                            article: item.article,
                            size: item.size || defaultSize,
                            images: Array(6).fill(null).map(() => ({ url: '', color: '' }))
                        };
                        newArticle.images[0] = { url: item.url, color: item.color };
                        newProducts.push(newArticle);
                    } else {
                        let article = newProducts[articleIndex];
                        let emptySlot = article.images.findIndex(img => !img.url);
                        if (emptySlot !== -1) {
                            article.images[emptySlot] = { url: item.url, color: item.color };
                        }
                    }
                });
                return newProducts;
            });
        }
        setIsProcessing(false); 
      };

      const handleSlotFileChange = async (e) => {
          if (!e.target.files || e.target.files.length === 0 || !activeSlot) return;
          setIsProcessing(true);
          const file = e.target.files[0];
          const parsed = parseFilename(file.name);
          const url = await removeWhiteBG(file);

          setProducts(prev => prev.map(p => {
              if (p.id === activeSlot.articleId) {
                  const newImages = [...p.images];
                  newImages[activeSlot.index] = { 
                      url: url, 
                      color: parsed.color || newImages[activeSlot.index].color 
                  };
                  return { ...p, images: newImages };
              }
              return p;

          e.target.value = ''; 
          setActiveSlot(null);

      const updateTransform = (id, field, value) => {
        setProducts(products.map(p => p.id === id ? { ...p, transform: { ...p.transform, [field]: Number(value) } } : p));

      const updateTextStyle = (id, field, value) => {

        setShowPrintHint(true);

        try {

            await new Promise((resolve) => {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
              script.onload = resolve; document.head.appendChild(script);
            });
          }
          if (!window.jspdf) {
            await new Promise((resolve) => {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
              script.onload = resolve; document.head.appendChild(script);
            });
          }

          const printElement = document.getElementById('printable-area');
          if (!printElement) throw new Error("Print element not found in DOM");
          
          const originalStyle = printElement.style.cssText;
          const originalClass = printElement.className;
          
          // Apply to both single & bulk modes to prevent mobile scroll clipping
          printElement.className = originalClass.replace(/scale-\[.*?\]/g, '').replace(/md:scale-\d+/g, '').replace(/origin-top/g, '');

          await new Promise(resolve => setTimeout(resolve, 50)); 

          const canvas = await window.html2canvas(printElement, {
            scale: 2, useCORS: true,
            backgroundColor: mode === 'single' ? '#0f172a' : '#ffffff',
            onclone: (clonedDoc) => {
               const clonedPrintArea = clonedDoc.getElementById('printable-area');

                   inputs.forEach(input => {
                       const div = clonedDoc.createElement('div');
                       div.textContent = input.value || input.placeholder;
                       div.className = input.className;
                       div.style.cssText = input.style.cssText;
                       div.style.whiteSpace = 'nowrap'; div.style.overflow = 'visible'; div.style.lineHeight = '1.2'; div.style.paddingBottom = '10px';
                       input.parentNode.replaceChild(div, input);

               }
            }
          });

          printElement.className = originalClass; 
          printElement.style.cssText = originalStyle;

          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          const pdf = new window.jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
          
          const fileName = mode === 'single' && products.length > 0 ? `INDUS_${products[0].article || 'Catalogue'}.pdf` : `INDUS_Catalogue.pdf`;

        } catch (e) {

                       <div className="space-y-4 mb-6">
                           <select value={config.themeId} onChange={(e) => setConfig({...config, themeId: e.target.value})} className="w-full p-2 text-sm border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-white font-medium">
                               {Object.values(THEMES).map(t => (<option key={t.id} value={t.id}>{t.name}</option>))}
                           </select>

                           <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                             <label className="flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer mb-3">
                                <input type="checkbox" checked={config.useCustomBg} onChange={e => setConfig({...config, useCustomBg: e.target.checked})} className="accent-teal-600 w-4 h-4" />
                                Custom Colors
                             </label>
                             {config.useCustomBg && (
                               <div className="flex gap-2 animate-in fade-in">
                                  <div className="flex-1"><label className="text-[10px] uppercase font-bold text-gray-400 block mb-1">Start</label><input type="color" value={config.bgStart} onChange={e => setConfig({...config, bgStart: e.target.value})} className="w-full h-8 rounded cursor-pointer" /></div>
                                  <div className="flex-1"><label className="text-[10px] uppercase font-bold text-gray-400 block mb-1">End</label><input type="color" value={config.bgEnd} onChange={e => setConfig({...config, bgEnd: e.target.value})} className="w-full h-8 rounded cursor-pointer" /></div>
                               </div>
                             )}
                           </div>
                       </div>

                       <h3 className="font-bold text-gray-800 mb-5 flex items-center gap-2 border-t pt-5"><Type size={18} className="text-teal-600"/> Adjust Text & Font</h3>
                       <div className="space-y-5">
                          <div>
                            <div className="flex justify-between mb-1"><label className="text-xs font-bold text-gray-500 uppercase">Global Font</label></div>
                            <select value={config.fontFamily} onChange={(e) => setConfig({...config, fontFamily: e.target.value})} className="w-full p-2 text-sm border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-teal-500 bg-white">
                                <optgroup label="Standard Fonts">
                                  <option value="font-sans">Modern (Sans)</option><option value="font-serif">Classic (Serif)</option><option value="font-mono">Technical (Mono)</option><option value="font-[Impact]">Bold (Impact)</option>
                                </optgroup>
                                <optgroup label="Designer Fonts">
                                  <option value="font-['Montserrat']">Clean Bold (Montserrat)</option><option value="font-['Bebas_Neue']">Tall Bold (Bebas Neue)</option><option value="font-['Oswald']">Athletic (Oswald)</option><option value="font-['Playfair_Display']">Elegant (Playfair)</option><option value="font-['Cinzel']">Luxury (Cinzel)</option><option value="font-['Caveat']">Handwriting (Caveat)</option>
                                </optgroup>
                            </select>
                          </div>
                          
                          {mode === 'single' && products.length > 0 && (
                            <>
                              <div>
                                <div className="flex justify-between mb-1"><label className="text-xs font-bold text-gray-500 uppercase">Article Size</label></div>
                                <input type="range" min="2" max="8" step="0.1" value={products[0].textStyle?.articleSize ?? 4.5} onChange={(e) => updateTextStyle(products[0].id, 'articleSize', e.target.value)} className="w-full accent-teal-600" />
                              </div>
                              <div>
                                <div className="flex justify-between mb-1"><label className="text-xs font-bold text-gray-500 uppercase">Details Size</label></div>
                                <input type="range" min="1" max="4" step="0.1" value={products[0].textStyle?.detailsSize ?? 2} onChange={(e) => updateTextStyle(products[0].id, 'detailsSize', e.target.value)} className="w-full accent-teal-600" />
                              </div>
                            </>
                          )}
                       </div>
                    </div>

                    {/* CONTENT/PREVIEW AREA */}
                    <div className="flex-1 min-w-0 w-full lg:w-auto overflow-x-auto print:overflow-visible custom-scrollbar">
                        {mode === 'single' && products.length > 0 ? (
                            <div ref={containerRef} className="flex justify-center bg-gray-100 print:bg-transparent p-2 sm:p-4 print:p-0 rounded-2xl print:rounded-none overflow-hidden shadow-inner print:shadow-none w-full min-h-[400px] sm:min-h-[500px]">
                              <div style={{ width: `${794 * posterScale}px`, height: `${1123 * posterScale}px` }} className="relative transition-all duration-300">
                                <div style={{ transform: `scale(${posterScale})`, transformOrigin: 'top left' }} className="absolute top-0 left-0 transition-transform duration-300">
                                  <SinglePoster product={products[0]} updateProduct={updateProduct} config={config} />
                                </div>
                              </div>
                            </div>
                        ) : (
                            <div className="w-full overflow-x-auto overflow-y-hidden bg-gray-200 p-2 sm:p-8 rounded-2xl print:p-0 print:bg-transparent print:overflow-visible custom-scrollbar">
                              <div id="printable-area" 
                                   className={`w-[794px] mx-auto bg-white print:bg-white print:p-0 min-h-[1056px] border border-gray-200 print:border-none shadow-2xl print:shadow-none p-10 rounded-sm bg-gradient-to-br ${config.fontFamily} ${!config.useCustomBg ? THEMES[config.themeId].bgClass : ''}`}
                                   style={config.useCustomBg ? { backgroundImage: `linear-gradient(to bottom right, ${config.bgStart}, ${config.bgEnd})` } : {}}
                              >
                                <div className={`flex justify-between items-end border-b-4 ${THEMES[config.themeId].bulkHeader} pb-6 mb-8 mt-2 transition-colors relative z-10`}>
                                  <IndusLogo theme={THEMES[config.themeId]} />
                                  <div className="text-right bg-white/90 backdrop-blur-sm px-6 py-4 rounded-2xl shadow-sm border border-white/50">
                                    <h2 className={`text-4xl font-black uppercase tracking-tight ${THEMES[config.themeId].bulkTitle || 'text-gray-900'}`}>{category}</h2>
                                    <p className="text-gray-500 mt-1 font-medium tracking-widest uppercase">Collection {new Date().getFullYear()}</p>
                                  </div>
                                </div>

                                <div className="relative mt-8">
                                    <div className="grid grid-cols-1 md:grid-cols-2 print:grid-cols-2 gap-x-12 gap-y-12 relative z-10">
                                      {products.map((product) => (
                                        <div key={product.id} className="flex flex-col group print:break-inside-avoid relative bg-white/95 backdrop-blur-md p-6 rounded-3xl shadow-lg border border-white/50">
                                            <div className="absolute -top-6 left-0 right-0 border-t-2 border-gray-100 print:border-gray-200 w-full hidden group-[&:nth-child(n+3)]:block"></div>

                                            <button 
                                                onClick={() => setProducts(prev => prev.filter(p => p.id !== product.id))}
                                                className="absolute -top-3 -right-3 bg-red-500 text-white p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity z-20 hover:bg-red-600 shadow-sm print:hidden"
                                                title="Remove Article"
                                            >
                                                <X size={14} />
                                            </button>

                                            <div className="flex justify-between items-end border-b-2 border-teal-500/20 pb-2 mb-4">
                                                <div className="flex-1 pr-4">
                                                    <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Article No.</div>
                                                    <input
                                                        value={product.article}
                                                        onChange={(e) => updateProduct(product.id, 'article', e.target.value)}
                                                        className="font-black text-2xl text-gray-900 leading-none w-full bg-transparent border-none outline-none focus:bg-teal-50 rounded px-1 transition-colors"
                                                        placeholder="ARTICLE NAME"
                                                    />
                                                </div>
                                                <div className="text-right w-1/3 border-l-2 border-teal-500/10 pl-4">
                                                    <span className="text-[10px] font-bold text-gray-500 uppercase tracking-widest block mb-0.5">SIZE</span>
                                                    <input
                                                        value={product.size}
                                                        onChange={(e) => updateProduct(product.id, 'size', e.target.value)}
                                                        className="text-sm font-bold text-gray-700 w-full text-right bg-transparent border-none outline-none focus:bg-teal-50 rounded uppercase transition-colors"
                                                        placeholder="Size"
                                                    />
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-3 grid-rows-2 gap-4">
                                                {product.images.map((img, i) => (
                                                    <div key={i} className="flex flex-col items-center group/slot">
                                                        <div 
                                                            onClick={() => triggerSlotUpload(product.id, i)}
                                                            className={`w-full aspect-square relative rounded-xl border-2 flex flex-col items-center justify-center overflow-hidden cursor-pointer transition-all shadow-sm
                                                                ${img.url ? 'bg-transparent border-transparent hover:border-teal-200' : 'bg-gray-50 border-dashed border-gray-300 hover:border-teal-400 hover:bg-teal-50'}`}
                                                            title="Click to Upload Image"
                                                        >
                                                            {img.url && (
                                                                <button 
                                                                    onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        const newImages = [...product.images];
                                                                        newImages[i] = { url: '', color: '' };
                                                                        updateProduct(product.id, 'images', newImages);
                                                                    }}
                                                                    className="absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white p-1 rounded-full opacity-0 group-hover/slot:opacity-100 transition-opacity z-20 print:hidden"
                                                                >
                                                                    <X size={10} />
                                                                </button>
                                                            )}

                                                            {img.url ? (
                                                                <img src={img.url} className="w-full h-full object-contain mix-blend-multiply drop-shadow-md p-1 group-hover/slot:scale-110 transition-transform duration-300" alt={`Color ${i}`} />
                                                            ) : (
                                                                <div className="flex flex-col items-center opacity-30 grayscale group-hover/slot:opacity-60 transition-opacity">
                                                                    <img src="indus-logo.png" className="h-6 object-contain mb-1" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                                                                    <span className="text-[8px] font-black tracking-widest text-gray-500 hidden">INDUS</span>
                                                                    <span className="text-[10px] font-medium text-gray-400 mt-1 print:hidden group-hover/slot:text-teal-600">+ Add</span>
                                                                </div>
                                                            )}
                                                        </div>

                                                        <input 
                                                            value={img.color}
                                                            onChange={(e) => {
                                                                const newImages = [...product.images];
                                                                newImages[i].color = e.target.value;
                                                                updateProduct(product.id, 'images', newImages);
                                                            }}
                                                            placeholder={img.url ? "COLOR NAME" : ""}
                                                            className="w-full mt-2 text-center text-[10px] font-bold text-gray-600 uppercase tracking-wider bg-transparent outline-none focus:bg-teal-50 rounded py-0.5 transition-colors border border-transparent hover:border-gray-200 print:border-none"
                                                        />
                                                    </div>
                                                ))}
                                            </div>

                                        </div>
                                      ))}
                                    </div>
                                </div>
                                <div className="hidden print:block mt-20 pt-6 border-t border-gray-200 text-center text-sm text-gray-500">
                                  <p>INDUS FOOTWEAR • Premium Quality Products</p>
                                </div>
                              </div>
                            </div>
                        )}
                    </div>
                </div>
              </div>
            )}

          </main>
      
      <style dangerouslySetInnerHTML={{__html: `
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@700&family=Cinzel:wght@700&family=Montserrat:wght@800&family=Oswald:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap');
        
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        @media print {
          body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
          @page { size: A4 portrait; margin: 0mm; }
        }
      `}} />
    </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
